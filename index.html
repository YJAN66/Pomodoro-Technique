<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 背景纹理 -->
  <div class="bg-texture"></div>

  <div class="container">
    <!-- 顶部栏：模式标签 + 设置按钮 -->
    <div class="top-bar">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="work">专注</button>
        <button class="mode-tab" data-mode="shortBreak">短休</button>
        <button class="mode-tab" data-mode="longBreak">长休</button>
      </div>
      <button class="option-btn" id="btnSettings" title="设置">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81a.48.48 0 00-.48-.31h-3.84a.48.48 0 00-.48.31l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.72 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.25.26.47.48.31h3.84c.24 0 .44-.18.48-.31l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- 设置面板（默认隐藏） -->
    <div class="settings-panel" id="settingsPanel">
      <div class="setting-row">
        <span class="setting-label">🍅 专注时长</span>
        <div class="setting-control">
          <button class="adj-btn" data-target="work" data-dir="-1">−</button>
          <span class="setting-value" id="workVal">25</span>
          <span class="setting-unit">分钟</span>
          <button class="adj-btn" data-target="work" data-dir="1">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">☕ 短休时长</span>
        <div class="setting-control">
          <button class="adj-btn" data-target="shortBreak" data-dir="-1">−</button>
          <span class="setting-value" id="shortBreakVal">5</span>
          <span class="setting-unit">分钟</span>
          <button class="adj-btn" data-target="shortBreak" data-dir="1">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">🌟 长休时长</span>
        <div class="setting-control">
          <button class="adj-btn" data-target="longBreak" data-dir="-1">−</button>
          <span class="setting-value" id="longBreakVal">15</span>
          <span class="setting-unit">分钟</span>
          <button class="adj-btn" data-target="longBreak" data-dir="1">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">🔄 自动开始下一轮</span>
        <label class="toggle-switch">
          <input type="checkbox" id="autoStartToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <button class="btn-reset-defaults" id="btnResetDefaults">恢复默认设置</button>
    </div>

    <!-- 环形进度条 -->
    <div class="timer-ring-container" id="timerRingContainer">
      <svg class="timer-ring" viewBox="0 0 220 220">
        <defs>
          <linearGradient id="gradWork" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e74c3c" />
            <stop offset="100%" stop-color="#ff6b6b" />
          </linearGradient>
          <linearGradient id="gradShortBreak" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#27ae60" />
            <stop offset="100%" stop-color="#2ecc71" />
          </linearGradient>
          <linearGradient id="gradLongBreak" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2980b9" />
            <stop offset="100%" stop-color="#3498db" />
          </linearGradient>
          <filter id="glowWork">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="glowShort">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <filter id="glowLong">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <!-- 背景环 -->
        <circle class="ring-bg" cx="110" cy="110" r="98" />
        <!-- 进度环 -->
        <circle class="ring-progress" cx="110" cy="110" r="98" />
        <!-- 刻度标记 -->
        <g id="tickMarks"></g>
      </svg>
      <!-- 时间显示 -->
      <div class="timer-display">
        <span class="timer-minutes">25</span>
        <span class="timer-colon">:</span>
        <span class="timer-seconds">00</span>
      </div>
    </div>

    <!-- 任务标签 -->
    <div class="task-label-wrapper">
      <span class="task-icon">{{icon}}</span>
      <span class="task-input" id="taskLabel" contenteditable="true" data-placeholder="点击设置当前任务..."></span>
    </div>

    <!-- 状态提示 -->
    <div class="status-text" id="statusText">准备开始专注</div>

    <!-- 控制按钮 -->
    <div class="controls">
      <button class="btn btn-reset" id="btnReset" title="重置 (R)">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>
      <button class="btn btn-start" id="btnStart" title="开始 (Space)">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <polygon points="6,3 20,12 6,21" fill="currentColor" />
        </svg>
      </button>
      <button class="btn btn-pause" id="btnPause" title="暂停 (Space)" style="display:none;">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <rect x="5" y="3" width="5" height="18" rx="1" fill="currentColor" />
          <rect x="14" y="3" width="5" height="18" rx="1" fill="currentColor" />
        </svg>
      </button>
      <button class="btn btn-skip" id="btnSkip" title="跳过 (S)">
        <svg viewBox="0 0 24 24" width="20" height="20">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <!-- 番茄计数 + 统计切换 -->
    <div class="info-section">
      <div class="pomodoro-count" id="pomodoroCountArea">
        <div class="count-dots" id="countDots"></div>
        <span class="count-label" id="countLabel">今日 0 个番茄</span>
      </div>
      <div class="stats-toggle" id="btnStats" title="统计">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path d="M5 9.2h3V19H5zM10.6 5h2.8v14h-2.8zm5.6 8H19v6h-2.8z" fill="currentColor"/>
        </svg>
      </div>
    </div>

    <!-- 统计面板（默认隐藏） -->
    <div class="stats-panel" id="statsPanel">
      <div class="stat-row">
        <span class="stat-label">今日专注</span>
        <span class="stat-value" id="statTodayFocus">0 分钟</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">完成番茄</span>
        <span class="stat-value" id="statTodayPomos">0 个</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">本周累计</span>
        <span class="stat-value" id="statWeekFocus">0 分钟</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">历史最佳</span>
        <span class="stat-value" id="statBestDay">--</span>
      </div>
      <div class="week-chart" id="weekChart"></div>
    </div>

    <!-- 底部选项 -->
    <div class="bottom-bar">
      <button class="option-btn" id="btnPin" title="窗口置顶">
        <svg viewBox="0 0 24 24" width="16" height="16">
          <path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z" fill="currentColor" />
        </svg>
      </button>
      <span class="shortcut-hint">Space 暂停 · R 重置 · S 跳过</span>
    </div>
  </div>

  <!-- 完成覆盖层 -->
  <div class="completion-overlay" id="completionOverlay">
    <div class="completion-card">
      <div class="completion-emoji" id="completionEmoji">🍅</div>
      <div class="completion-title" id="completionTitle">专注完成！</div>
      <div class="completion-subtitle" id="completionSubtitle">休息一下吧~</div>
      <button class="completion-dismiss" id="completionDismiss">知道了</button>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
